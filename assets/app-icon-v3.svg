<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mandalaGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A012"/>
      <stop offset="100%" style="stop-color:#F5C842"/>
    </linearGradient>
    <radialGradient id="mandalaCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFF8E7"/>
      <stop offset="100%" style="stop-color:#FFE4A0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="#FFFBF0" stroke="#E8D5A3" stroke-width="4"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#mandalaGold)" stroke-width="3" opacity="0.4"/>

  <!-- Petal layer 1 (outer) - 8 petals -->
  <ellipse cx="256" cy="130" rx="28" ry="55" fill="url(#mandalaGold)" opacity="0.85"/>
  <ellipse cx="256" cy="382" rx="28" ry="55" fill="url(#mandalaGold)" opacity="0.85"/>
  <ellipse cx="130" cy="256" rx="55" ry="28" fill="url(#mandalaGold)" opacity="0.85"/>
  <ellipse cx="382" cy="256" rx="55" ry="28" fill="url(#mandalaGold)" opacity="0.85"/>
  <ellipse cx="165" cy="165" rx="28" ry="50" fill="url(#mandalaGold)" opacity="0.7" transform="rotate(45 165 165)"/>
  <ellipse cx="347" cy="165" rx="28" ry="50" fill="url(#mandalaGold)" opacity="0.7" transform="rotate(-45 347 165)"/>
  <ellipse cx="165" cy="347" rx="28" ry="50" fill="url(#mandalaGold)" opacity="0.7" transform="rotate(-45 165 347)"/>
  <ellipse cx="347" cy="347" rx="28" ry="50" fill="url(#mandalaGold)" opacity="0.7" transform="rotate(45 347 347)"/>

  <!-- Petal layer 2 - 8 smaller petals -->
  <ellipse cx="256" cy="165" rx="18" ry="35" fill="url(#mandalaGold)" opacity="0.6"/>
  <ellipse cx="256" cy="347" rx="18" ry="35" fill="url(#mandalaGold)" opacity="0.6"/>
  <ellipse cx="165" cy="256" rx="35" ry="18" fill="url(#mandalaGold)" opacity="0.6"/>
  <ellipse cx="347" cy="256" rx="35" ry="18" fill="url(#mandalaGold)" opacity="0.6"/>
  <ellipse cx="180" cy="180" rx="18" ry="32" fill="url(#mandalaGold)" opacity="0.5" transform="rotate(45 180 180)"/>
  <ellipse cx="332" cy="180" rx="18" ry="32" fill="url(#mandalaGold)" opacity="0.5" transform="rotate(-45 332 180)"/>
  <ellipse cx="180" cy="332" rx="18" ry="32" fill="url(#mandalaGold)" opacity="0.5" transform="rotate(-45 180 332)"/>
  <ellipse cx="332" cy="332" rx="18" ry="32" fill="url(#mandalaGold)" opacity="0.5" transform="rotate(45 332 332)"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#D4A012" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="256" r="85" fill="none" stroke="#D4A012" stroke-width="1.5" opacity="0.3"/>

  <!-- Center circle - honey pot symbol -->
  <circle cx="256" cy="256" r="65" fill="url(#mandalaCenter)" stroke="#D4A012" stroke-width="3"/>

  <!-- Mini honeycomb in center -->
  <path d="M256 215 L280 230 L280 255 L256 270 L232 255 L232 230 Z" fill="url(#mandalaGold)"/>
  <path d="M226 240 L250 255 L250 280 L226 295 L202 280 L202 255 Z" fill="url(#mandalaGold)" opacity="0.7"/>
  <path d="M286 240 L310 255 L310 280 L286 295 L262 280 L262 255 Z" fill="url(#mandalaGold)" opacity="0.7"/>

  <!-- Small bee in center -->
  <ellipse cx="256" cy="255" rx="12" ry="8" fill="#3D2914"/>
  <rect x="246" y="250" width="20" height="3" rx="1.5" fill="#D4A012"/>
  <rect x="246" y="257" width="20" height="3" rx="1.5" fill="#D4A012"/>
  <circle cx="250" cy="253" r="2" fill="#3D2914"/>
  <circle cx="262" cy="253" r="2" fill="#3D2914"/>
  <ellipse cx="244" cy="249" rx="8" ry="5" fill="#FFF8E7" stroke="#E8D5A3" stroke-width="1" opacity="0.8"/>
  <ellipse cx="268" cy="249" rx="8" ry="5" fill="#FFF8E7" stroke="#E8D5A3" stroke-width="1" opacity="0.8"/>

  <!-- Sparkles around the mandala -->
  <circle cx="256" cy="56" r="5" fill="#F5C842" opacity="0.7"/>
  <circle cx="256" cy="456" r="5" fill="#F5C842" opacity="0.7"/>
  <circle cx="56" cy="256" r="5" fill="#F5C842" opacity="0.7"/>
  <circle cx="456" cy="256" r="5" fill="#F5C842" opacity="0.7"/>
  <circle cx="100" cy="100" r="3" fill="#F5C842" opacity="0.5"/>
  <circle cx="412" cy="100" r="3" fill="#F5C842" opacity="0.5"/>
  <circle cx="100" cy="412" r="3" fill="#F5C842" opacity="0.5"/>
  <circle cx="412" cy="412" r="3" fill="#F5C842" opacity="0.5"/>
</svg>
