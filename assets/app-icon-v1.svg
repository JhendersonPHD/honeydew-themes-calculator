<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="honeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A012"/>
      <stop offset="100%" style="stop-color:#F5C842"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E7;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FFE4A0;stop-opacity:0.7"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#FFFBF0" stroke="#E8D5A3" stroke-width="4"/>

  <!-- Honey jar body -->
  <path d="M170 200 L170 380 Q170 420 210 420 L302 420 Q342 420 342 380 L342 200 Z" fill="url(#glassGrad)" stroke="#D4A012" stroke-width="3"/>

  <!-- Honey inside jar -->
  <path d="M175 280 L175 375 Q175 410 212 410 L300 410 Q337 410 337 375 L337 280 Q300 310 256 310 Q212 310 175 280 Z" fill="url(#honeyGrad)" opacity="0.85"/>

  <!-- Jar lid -->
  <rect x="160" y="165" width="192" height="40" rx="8" fill="url(#honeyGrad)"/>
  <rect x="155" y="160" width="202" height="12" rx="6" fill="#3D2914"/>

  <!-- Jar neck -->
  <rect x="185" y="195" width="142" height="20" rx="4" fill="#FFF8E7" stroke="#D4A012" stroke-width="2"/>

  <!-- Bee -->
  <ellipse cx="256" cy="130" rx="28" ry="20" fill="#3D2914"/>
  <rect x="238" y="120" width="36" height="6" rx="3" fill="#D4A012"/>
  <rect x="238" y="134" width="36" height="6" rx="3" fill="#D4A012"/>

  <!-- Bee wings -->
  <ellipse cx="225" cy="115" rx="22" ry="14" fill="#FFF8E7" stroke="#E8D5A3" stroke-width="2" opacity="0.85"/>
  <ellipse cx="287" cy="115" rx="22" ry="14" fill="#FFF8E7" stroke="#E8D5A3" stroke-width="2" opacity="0.85"/>

  <!-- Bee eyes -->
  <circle cx="245" cy="126" r="4" fill="#3D2914"/>
  <circle cx="267" cy="126" r="4" fill="#3D2914"/>

  <!-- Honey drip -->
  <path d="M256 205 Q250 220 252 235 Q256 245 260 235 Q262 220 256 205" fill="url(#honeyGrad)"/>

  <!-- Sparkles -->
  <circle cx="380" cy="180" r="5" fill="#F5C842" opacity="0.7"/>
  <circle cx="395" cy="200" r="3" fill="#F5C842" opacity="0.5"/>
  <circle cx="130" cy="300" r="4" fill="#F5C842" opacity="0.6"/>
</svg>
